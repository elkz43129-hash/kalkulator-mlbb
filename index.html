<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Winrate Calculator</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        :root {
            --bg-cyber: radial-gradient(circle at center, #111424 0%, #060814 100%);
            --glass-card: rgba(18, 22, 43, 0.7);
            --neon-blue: #00e5ff;
            --neon-pink: #ff007f;
            --text-white: #f1f5f9;
            --text-gray: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.08);
        }
        body { 
            background: var(--bg-cyber); 
            color: var(--text-white); 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
        }
        header { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            background: rgba(6, 8, 20, 0.8); 
            border-bottom: 1px solid var(--border-glass); 
            backdrop-filter: blur(10px); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .brand { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 20px; 
            font-weight: 700; 
            letter-spacing: 2px; 
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .container { max-width: 500px; width: 100%; margin: auto; padding: 20px 15px; }
        .card { 
            background: var(--glass-card); 
            border: 1px solid var(--border-glass); 
            border-radius: 20px; 
            padding: 25px; 
            backdrop-filter: blur(20px); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
        }
        h3 { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 18px; 
            margin-bottom: 20px; 
            color: var(--text-white); 
            border-left: 4px solid var(--neon-blue); 
            padding-left: 10px; 
        }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: var(--text-gray); margin-bottom: 6px; font-weight: 500; }
        input, select { 
            width: 100%; 
            padding: 12px 16px; 
            background: rgba(6, 8, 20, 0.5); 
            border: 1px solid var(--border-glass); 
            border-radius: 12px; 
            color: #fff; 
            font-size: 15px; 
            transition: 0.3s; 
        }
        input:focus, select:focus { 
            outline: none; 
            border-color: var(--neon-blue); 
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); 
        }
        .sub-group-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .action-btn { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(90deg, var(--neon-blue), #0088cc); 
            color: #fff; 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 14px; 
            text-transform: uppercase; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px; 
        }
        .action-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(0, 229, 255, 0.4); 
        }
        .result-view { 
            margin-top: 20px; 
            padding: 15px; 
            background: rgba(0, 229, 255, 0.05); 
            border: 1px dashed var(--neon-blue); 
            border-radius: 12px; 
            font-size: 14px; 
            line-height: 1.6; 
            display: none; 
        }
        .result-view.show { display: block; }
    </style>
</head>
<body>

    <header>
        <div class="brand">MLBB SYNERGY</div>
    </header>

    <div class="container">
        <!-- MODE UTAMA: WINRATE CALCULATOR -->
        <div class="card">
            <h3>Kalkulator Winrate MLBB</h3>
            
            <div class="input-group">
                <label>Mode Perhitungan</label>
                <select id="wrMode">
                    <option value="all">Keseluruhan Akun (All Season)</option>
                    <option value="hero">Spesifik Hero Pertandingan</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Total Match Saat Ini</label>
                <input type="number" id="wrTotalMatch" placeholder="Contoh: 520">
            </div>
            
            <div class="sub-group-grid">
                <div class="input-group">
                    <label>WR Saat Ini (%)</label>
                    <input type="number" step="0.01" id="wrCurrent" placeholder="Contoh: 54.2">
                </div>
                <div class="input-group">
                    <label>Target WR (%)</label>
                    <input type="number" step="0.01" id="wrTarget" placeholder="Contoh: 60">
                </div>
            </div>
            
            <button class="action-btn" onclick="calculateWinrate()">Hitung Target WR</button>
            
            <div class="result-view" id="wrResultBox">
                <p id="wrResultText"></p>
            </div>
        </div>
    </div>

    <script>
        function calculateWinrate() {
            const matches = parseInt(document.getElementById('wrTotalMatch').value);
            const current = parseFloat(document.getElementById('wrCurrent').value);
            const target = parseFloat(document.getElementById('wrTarget').value);
            const box = document.getElementById('wrResultBox');
            const txt = document.getElementById('wrResultText');

            // Validasi Input Kosong
            if(isNaN(matches) || isNaN(current) || isNaN(target)) { 
                alert("Isi semua data dulu bro, jangan kosongan!"); 
                return; 
            }
            // Validasi Angka di Atas Batas Logis
            if(target >= 100 || current >= 100) { 
                alert("WR target gak masuk akal kalau diatas atau sama dengan 100%!"); 
                return; 
            }
            // Validasi Target Lebih Rendah
            if(target <= current) { 
                alert("Target WR harus lebih tinggi dari WR kamu yang sekarang lah!"); 
                return; 
            }

            // Rumus matematika hitung winrate beruntun (winstreak)
            const currentWins = Math.round(matches * (current / 100));
            const requiredWins = Math.ceil((matches * (target / 100) - currentWins) / (1 - (target / 100)));

            // Tampilkan Box Hasil
            box.classList.add('show');
            
            // Render text hasil kalkulasi ke user
            txt.innerHTML = `Total kemenangan saat ini: <b>${currentWins} Win</b>.<br>
            Biar dapet aura Sigma dengan target <b>${target}%</b>, kamu wajib winstreak bersih 
            <span style="color:#00e5ff; font-weight:bold;">${requiredWins}x Win</span> tanpa kalah sekalipun!`;
        }
    </script>
</body>
</html>
