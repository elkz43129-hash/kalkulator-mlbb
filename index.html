<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Win Rate MLBB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: #0ea5e9;
        }

        .result {
            margin-top: 25px;
            padding: 15px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 8px;
            border-left: 4px solid #38bdf8;
            display: none;
        }

        .result p {
            font-size: 15px;
            line-height: 1.6;
        }

        .highlight {
            color: #f43f5e;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Kalkulator WR MLBB</h2>
    
    <div class="input-group">
        <label for="totalMatch">Total Match Saat Ini</label>
        <input type="number" id="totalMatch" placeholder="Contoh: 500">
    </div>
    
    <div class="input-group">
        <label for="currentWr">Win Rate Saat Ini (%)</label>
        <input type="number" step="0.01" id="currentWr" placeholder="Contoh: 55.2">
    </div>
    
    <div class="input-group">
        <label for="targetWr">Target Win Rate (%)</label>
        <input type="number" step="0.01" id="targetWr" placeholder="Contoh: 60">
    </div>
    
    <button onclick="hitungWinrate()">Hitung Berapa Win Lagi</button>
    
    <div class="result" id="resultBox">
        <p id="resultText"></p>
    </div>
</div>

<script>
function hitungWinrate() {
    // Ambil data dari inputan
    const tMatch = parseInt(document.getElementById('totalMatch').value);
    const cWr = parseFloat(document.getElementById('currentWr').value);
    const tWr = parseFloat(document.getElementById('targetWr').value);
    const resultBox = document.getElementById('resultBox');
    const resultText = document.getElementById('resultText');

    // Validasi input kosong
    if (isNaN(tMatch) || isNaN(cWr) || isNaN(tWr)) {
        alert("Harap isi semua kolom terlebih dahulu!");
        return;
    }

    if (tWr >= 100 || cWr >= 100) {
        alert("Win Rate tidak boleh mencapai atau melebihi 100%!");
        return;
    }

    if (tWr <= cWr) {
        alert("Target WR harus lebih tinggi dari WR saat ini!");
        return;
    }

    // Rumus Matematika menghitung sisa win tanpa lose
    const totalWin = Math.round(tMatch * (cWr / 100));
    const hasilWin = Math.ceil((tMatch * (tWr / 100) - totalWin) / (1 - (tWr / 100)));

    // Tampilkan hasil
    resultBox.style.display = "block";
    if (hasilWin > 0) {
        resultText.innerHTML = `Kamu saat ini memiliki <b>${totalWin}</b> total kemenangan.<br>Untuk mencapai WR <b>${tWr}%</b>, kamu membutuhkan sekitar <span class="highlight">${hasilWin}x Win beruntun (tanpa lose)</span>.`;
    } else {
        resultText.innerHTML = `Target WR sudah tercapai atau data yang dimasukkan keliru.`;
    }
}
</script>

</body>
</html>
